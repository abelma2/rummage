<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" font-family="system-ui, sans-serif">
  <!-- Fridge interior background -->
  <rect width="1024" height="768" fill="#e9efea"/>
  <rect x="24" y="24" width="976" height="720" rx="18" fill="#f3f7f4" stroke="#cdd8d0" stroke-width="3"/>
  <!-- soft top light -->
  <rect x="24" y="24" width="976" height="120" rx="18" fill="#ffffff" opacity="0.5"/>

  <!-- Shelves (glass) -->
  <rect x="40" y="250" width="944" height="12" rx="6" fill="#d4ddd6" opacity="0.85"/>
  <rect x="40" y="470" width="944" height="12" rx="6" fill="#d4ddd6" opacity="0.85"/>
  <!-- Crisper drawer -->
  <rect x="40" y="612" width="944" height="120" rx="12" fill="#dfe7e1" stroke="#cdd8d0" stroke-width="2"/>
  <rect x="470" y="600" width="84" height="10" rx="5" fill="#c4d0c7"/>

  <!-- ===================== TOP SHELF ===================== -->
  <!-- Milk carton -->
  <g>
    <polygon points="120,118 220,118 220,150 170,176 120,150" fill="#f2f5f8"/>
    <rect x="120" y="150" width="100" height="92" fill="#eef2f6"/>
    <rect x="120" y="150" width="100" height="92" fill="none" stroke="#c4ccd4" stroke-width="2"/>
    <polygon points="120,118 220,118 220,150 170,176 120,150" fill="none" stroke="#c4ccd4" stroke-width="2"/>
    <rect x="120" y="182" width="100" height="34" fill="#3f7fd0" opacity="0.85"/>
    <text x="170" y="205" font-size="17" fill="#ffffff" text-anchor="middle" font-weight="700">MILK</text>
  </g>

  <!-- Orange juice bottle -->
  <g>
    <rect x="280" y="110" width="26" height="22" rx="4" fill="#7a8a7e"/>
    <rect x="270" y="132" width="46" height="22" rx="8" fill="#d9e0db"/>
    <path d="M268 154 h50 v74 a14 14 0 0 1 -14 14 h-22 a14 14 0 0 1 -14 -14 z" fill="#f4a52b"/>
    <rect x="272" y="170" width="42" height="40" rx="4" fill="#ffffff" opacity="0.25"/>
  </g>

  <!-- Butter box -->
  <g>
    <rect x="360" y="196" width="118" height="46" rx="6" fill="#f5d77a" stroke="#e0bd55" stroke-width="2"/>
    <rect x="360" y="196" width="118" height="16" rx="6" fill="#ffffff" opacity="0.35"/>
    <text x="419" y="226" font-size="17" fill="#9a7320" text-anchor="middle" font-weight="700">BUTTER</text>
  </g>

  <!-- Bread loaf -->
  <g>
    <path d="M560 244 q-6 -78 96 -78 q102 0 96 78 z" fill="#c98b4a"/>
    <path d="M560 244 q-6 -78 96 -78 q102 0 96 78 z" fill="none" stroke="#a96f34" stroke-width="2"/>
    <path d="M584 200 q12 -16 24 0 M620 192 q12 -16 24 0 M656 192 q12 -16 24 0 M692 200 q12 -16 24 0" fill="none" stroke="#a96f34" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Eggs carton -->
  <g>
    <rect x="800" y="196" width="172" height="48" rx="10" fill="#c8c2b6"/>
    <rect x="800" y="196" width="172" height="48" rx="10" fill="none" stroke="#aaa294" stroke-width="2"/>
    <ellipse cx="828" cy="196" rx="20" ry="22" fill="#f3ede0"/>
    <ellipse cx="872" cy="194" rx="20" ry="22" fill="#efe7d8"/>
    <ellipse cx="916" cy="196" rx="20" ry="22" fill="#f3ede0"/>
    <ellipse cx="958" cy="196" rx="18" ry="20" fill="#efe7d8"/>
  </g>

  <!-- ===================== MIDDLE SHELF ===================== -->
  <!-- Cheese wedge -->
  <g>
    <polygon points="120,460 250,460 250,400 120,460" fill="#f6c945"/>
    <polygon points="120,460 250,460 250,430 120,460" fill="#e8b531"/>
    <polygon points="120,460 250,460 250,400 120,460" fill="none" stroke="#d4a528" stroke-width="2"/>
    <circle cx="200" cy="448" r="7" fill="#e8b531"/>
    <circle cx="225" cy="438" r="5" fill="#e8b531"/>
    <circle cx="180" cy="453" r="4" fill="#e8b531"/>
  </g>

  <!-- Tomatoes -->
  <g>
    <circle cx="340" cy="430" r="34" fill="#db4b34"/>
    <circle cx="340" cy="430" r="34" fill="none" stroke="#b53a26" stroke-width="2"/>
    <ellipse cx="328" cy="416" rx="10" ry="6" fill="#ffffff" opacity="0.3"/>
    <path d="M340 400 l-6 -8 m6 8 l6 -8 m-6 8 l0 -10" stroke="#2e6b4e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="404" cy="446" r="30" fill="#db4b34"/>
    <circle cx="404" cy="446" r="30" fill="none" stroke="#b53a26" stroke-width="2"/>
    <ellipse cx="394" cy="434" rx="9" ry="5" fill="#ffffff" opacity="0.3"/>
    <path d="M404 420 l-5 -7 m5 7 l5 -7" stroke="#2e6b4e" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Lemon -->
  <g>
    <ellipse cx="520" cy="446" rx="40" ry="28" fill="#f4d531"/>
    <ellipse cx="520" cy="446" rx="40" ry="28" fill="none" stroke="#d8ba24" stroke-width="2"/>
    <circle cx="560" cy="446" r="4" fill="#d8ba24"/>
    <circle cx="480" cy="446" r="4" fill="#d8ba24"/>
    <ellipse cx="508" cy="436" rx="12" ry="6" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- Broccoli -->
  <g>
    <rect x="660" y="430" width="16" height="34" rx="6" fill="#bcd29a"/>
    <circle cx="650" cy="420" r="22" fill="#3f7a3f"/>
    <circle cx="678" cy="416" r="24" fill="#356b35"/>
    <circle cx="700" cy="428" r="20" fill="#3f7a3f"/>
    <circle cx="668" cy="436" r="22" fill="#418141"/>
    <circle cx="650" cy="420" r="6" fill="#2f5f2f" opacity="0.5"/>
    <circle cx="685" cy="424" r="6" fill="#2f5f2f" opacity="0.5"/>
  </g>

  <!-- Block of cheddar / yogurt tub -->
  <g>
    <rect x="800" y="404" width="120" height="60" rx="10" fill="#eef2f6" stroke="#c4ccd4" stroke-width="2"/>
    <rect x="800" y="404" width="120" height="20" rx="10" fill="#9bbf8e"/>
    <text x="860" y="448" font-size="16" fill="#6b7268" text-anchor="middle" font-weight="700">YOGURT</text>
  </g>

  <!-- ===================== CRISPER DRAWER ===================== -->
  <!-- Carrots -->
  <g>
    <polygon points="120,700 140,636 160,700" fill="#e8852b"/>
    <polygon points="140,700 160,640 180,700" fill="#f0922f"/>
    <path d="M140,636 l-8 -16 m8 16 l0 -18 m0 18 l8 -16" stroke="#3f7a3f" stroke-width="4" stroke-linecap="round"/>
    <path d="M160,640 l-8 -16 m8 16 l0 -18 m0 18 l8 -16" stroke="#3f7a3f" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Red bell pepper -->
  <g>
    <path d="M280 712 q-44 0 -44 -42 q0 -34 22 -34 q10 0 22 8 q12 -8 22 -8 q22 0 22 34 q0 42 -44 42 z" fill="#d83b3b"/>
    <path d="M280 636 l0 -16 q0 -8 8 -8" fill="none" stroke="#3f7a3f" stroke-width="5" stroke-linecap="round"/>
    <path d="M268 648 q-6 30 0 58" stroke="#ffffff" stroke-width="6" opacity="0.18" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Onion -->
  <g>
    <ellipse cx="400" cy="676" rx="40" ry="44" fill="#e7c98f"/>
    <ellipse cx="400" cy="676" rx="40" ry="44" fill="none" stroke="#c9a866" stroke-width="2"/>
    <path d="M400 632 q-16 44 0 88 M380 636 q-12 40 0 80 M420 636 q12 40 0 80" stroke="#c9a866" stroke-width="2" fill="none"/>
    <path d="M392 632 q8 -10 16 0" stroke="#9a8350" stroke-width="3" fill="none"/>
  </g>

  <!-- Spinach / leafy greens bunch -->
  <g>
    <path d="M520 712 q-30 -10 -22 -52 q20 12 22 52z" fill="#3f7a3f"/>
    <path d="M540 712 q-10 -40 8 -64 q14 24 -8 64z" fill="#418141"/>
    <path d="M560 712 q30 -10 22 -52 q-20 12 -22 52z" fill="#356b35"/>
    <path d="M540 712 q0 -30 0 -60" stroke="#2f5f2f" stroke-width="2" fill="none"/>
  </g>

  <!-- Garlic -->
  <g>
    <path d="M700 706 q-22 0 -22 -30 q0 -24 22 -24 q22 0 22 24 q0 30 -22 30z" fill="#f1ece2"/>
    <path d="M700 652 q4 -14 0 -2 M700 652 l-8 54 M700 652 l8 54 M700 652 l0 54" stroke="#d9d2c4" stroke-width="2" fill="none"/>
  </g>

  <!-- Pasta box -->
  <g>
    <rect x="820" y="630" width="120" height="86" rx="6" fill="#0f4c81"/>
    <rect x="828" y="650" width="104" height="40" rx="4" fill="#f4d531"/>
    <text x="880" y="648" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="700">PASTA</text>
    <line x1="844" y1="658" x2="844" y2="682" stroke="#e0b800" stroke-width="3"/>
    <line x1="858" y1="658" x2="858" y2="682" stroke="#e0b800" stroke-width="3"/>
    <line x1="872" y1="658" x2="872" y2="682" stroke="#e0b800" stroke-width="3"/>
    <line x1="886" y1="658" x2="886" y2="682" stroke="#e0b800" stroke-width="3"/>
    <line x1="900" y1="658" x2="900" y2="682" stroke="#e0b800" stroke-width="3"/>
    <line x1="914" y1="658" x2="914" y2="682" stroke="#e0b800" stroke-width="3"/>
  </g>
</svg>
